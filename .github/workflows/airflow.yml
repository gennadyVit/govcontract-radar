name: Build and deploy Airflow

on:
  push:
    branches: [main]
    paths:
      - "airflow/**"
      - "ingestion/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: govcontractacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Airflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: airflow/Dockerfile
          push: true
          tags: govcontractacr.azurecr.io/govcontract-airflow:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9BDCAC8ECB2F47328586632B35F9C63A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_14D109E23B6E4485B7980BEAC052D304 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C50180A01B164D3CB390D3CB03C4E5AC }}

      - name: Update Container App to latest image
        run: |
          az containerapp update \
            --name govcontract-airflow \
            --resource-group govcontract-rg \
            --image govcontractacr.azurecr.io/govcontract-airflow:latest
