name: Build and deploy Streamlit UI to Azure Web App - govcontract-ui

on:
  push:
    branches:
      - main
    paths:
      - "streamlit/**"
      - "requirements-streamlit.txt"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: govcontractacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: streamlit/Dockerfile
          push: true
          tags: govcontractacr.azurecr.io/govcontract-ui:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9BDCAC8ECB2F47328586632B35F9C63A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_14D109E23B6E4485B7980BEAC052D304 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C50180A01B164D3CB390D3CB03C4E5AC }}

      - name: Deploy container to Azure Web App
        run: |
          az webapp config container set \
            --name govcontract-ui \
            --resource-group govcontract-rg \
            --docker-custom-image-name govcontractacr.azurecr.io/govcontract-ui:latest \
            --docker-registry-server-url https://govcontractacr.azurecr.io \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}
